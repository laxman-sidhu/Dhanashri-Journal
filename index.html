<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhanashri Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Gaegu:wght@400;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
  <div class="site-head">
    <div class="kicker">a little travel diary</div>
    <h1>Dhanashri Journal</h1>
    <p>Stories, places, and small everyday moments.</p>
  </div>
  <div id="cards" class="cards"></div>
  <div id="loading" class="loading">opening the journal...</div>

<script src="assets/core.js"></script>
<script>
(async function(){
  const J=window.JOURNAL;
  const cards=document.getElementById('cards');
  const loading=document.getElementById('loading');
  try{
    const res=await fetch('data/index.json?t='+Date.now(), {cache:'no-store'});
    let list = res.ok ? await res.json() : [];
    loading.style.display='none';
    if(!Array.isArray(list) || list.length===0){
      cards.innerHTML='<div class="empty"><div class="big">No stories yet</div><div>The first story will appear here soon.</div></div>';
      return;
    }
    list.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
    list.forEach(p=>{
      const a=document.createElement('a');
      a.className='card'; a.href='story.html?id='+encodeURIComponent(p.id);
      const thumb = p.thumb
        ? '<img class="thumb" src="'+p.thumb+'" alt="">'
        : '<div class="thumb placeholder">✿</div>';
      a.innerHTML = thumb +
        '<div class="c-date">'+J.escapeHtml(J.formatDate(p.date))+'</div>'+
        '<div class="c-title">'+J.escapeHtml(p.title||'Untitled')+'</div>';
      cards.appendChild(a);
    });
  }catch(e){
    loading.innerHTML='Could not load stories yet.<br><span style="font-size:14px;font-family:var(--body)">If this is a brand new site, publish your first story from the editor.</span>';
  }
})();
</script>
</body>
</html>
